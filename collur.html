<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenny's Color Studio ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #fffafa; --card: #ffffff; --text: #4a4a4a; --border: #ffd1dc; --accent: #ff85a1; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .app-grid {
            display: grid; grid-template-columns: 350px 1fr; gap: 30px;
            width: 100%; max-width: 1050px; background: var(--card);
            padding: 30px; border-radius: 40px; border: 4px solid var(--border);
            box-shadow: 0 15px 0px #ffd1dc;
        }

        /* WHEEL & CONTROLS */
        .left-panel { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #wheel { 
            width: 280px; height: 280px; border-radius: 50%; 
            background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
            cursor: crosshair; border: 8px solid white; position: relative;
            box-shadow: 0 10px 25px rgba(255, 133, 161, 0.15);
            touch-action: none; 
        }
        .marker { 
            position: absolute; width: 16px; height: 16px; border: 3px solid white; 
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; 
            box-shadow: 0 0 10px rgba(0,0,0,0.2); 
        }

        /* STATUS INDICATOR STYLES */
        .status-box {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 5px;
            text-align: center;
            background: #fdfdfd;
            border: 1px dashed #ffd1dc;
            transition: 0.3s;
        }

        input[type=range] { width: 100%; appearance: none; height: 10px; border-radius: 10px; background: #ffe4e9; outline: none; margin: 10px 0; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; background: var(--accent); border-radius: 50%; border: 3px solid white; cursor: pointer; }

        /* DATA SECTIONS */
        .label { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        
        .hero-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .swatch-card { background: #fdfdfd; border: 2px solid #f9f9f9; border-radius: 20px; padding: 15px; transition: 0.3s; }
        .box-preview { height: 100px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid #eee; }
        .code-row { font-family: monospace; font-size: 12px; background: #fff; padding: 6px 10px; border-radius: 8px; margin-top: 5px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .code-row:hover { border-color: var(--accent); background: var(--bg); }
        .code-label { font-weight: bold; font-family: 'Inter', sans-serif; font-size: 10px; color: #888; }

        .palette-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 25px; }
        .mini-swatch { height: 50px; border-radius: 12px; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; }
        .mini-swatch:hover { transform: translateY(-3px); }

        /* FOOTER & RGB EFFECT */
        @keyframes rgb-text {
            0% { color: #ff85a1; text-shadow: 2px 2px #ffdfdf; }
            33% { color: #85d7ff; text-shadow: 2px 2px #dff5ff; }
            66% { color: #85ff9d; text-shadow: 2px 2px #e9ffdf; }
            100% { color: #ff85a1; text-shadow: 2px 2px #ffdfdf; }
        }

        .footer { 
            margin-top: 40px; 
            font-family: 'Press Start 2P', cursive; 
            font-size: 14px; 
            animation: rgb-text 4s linear infinite;
        }

        .preview-mockup { background: #f8f9fa; border: 2px dashed var(--border); border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>

<div class="app-grid">
    <div class="left-panel">
        <h2 style="color: var(--accent); margin: 0; font-family: 'Press Start 2P'; font-size: 12px;">STUDIO ✨</h2>
        
        <div id="wheel">
            <div id="marker" class="marker" style="top: 50%; left: 50%;"></div>
        </div>

        <div style="width: 100%;">
            <span class="label">Saturation</span>
            <div id="satStatus" class="status-box">VIVID / NEON</div>
            <input type="range" id="sat" min="0" max="100" value="100" oninput="update()">
            
            <span class="label" style="margin-top: 15px;">Lightness</span>
            <div id="lightStatus" class="status-box">NORMAL / VIBRANT</div>
            <input type="range" id="light" min="0" max="100" value="50" oninput="update()">
        </div>
    </div>

    <div class="right-panel">
        <div class="hero-pair">
            <div class="swatch-card">
                <span class="label">Primary Selection</span>
                <div id="mainBox" class="box-preview" onclick="copy('hexMain')"></div>
                <div class="code-row" onclick="copy('hexMain')"><span class="code-label">HEX</span><span id="hexMain">#FF0000</span></div>
                <div class="code-row" onclick="copy('rgbMain')"><span class="code-label">RGB</span><span id="rgbMain">255, 0, 0</span></div>
                <div class="code-row" onclick="copy('hslMain')"><span class="code-label">HSL</span><span id="hslMain">0°, 100%, 50%</span></div>
            </div>
            <div class="swatch-card">
                <span class="label">Opposite Match</span>
                <div id="oppBox" class="box-preview" onclick="copy('hexOpp')"></div>
                <div class="code-row" onclick="copy('hexOpp')"><span class="code-label">HEX</span><span id="hexOpp">#00FFFF</span></div>
                <div class="code-row" onclick="copy('rgbOpp')"><span class="code-label">RGB</span><span id="rgbOpp">0, 255, 255</span></div>
                <div class="code-row" onclick="copy('hslOpp')"><span class="code-label">HSL</span><span id="hslOpp">180°, 100%, 50%</span></div>
            </div>
        </div>

        <span class="label">Tonal Gradient (Suggested)</span>
        <div id="tonalRow" class="palette-row"></div>

        <span class="label">Matching Palette (Analogous)</span>
        <div id="harmonyRow" class="palette-row"></div>

        <div class="preview-mockup">
            <span class="label" style="color:#999">Live Website Preview</span>
            <button id="mockBtn" style="border:none; padding:10px 20px; border-radius:10px; font-weight:bold; cursor:pointer;">Sample Button</button>
            <span id="mockText" style="margin-left:15px; font-weight:bold; font-size:18px;">Headline Sample</span>
        </div>
    </div>
</div>

<div class="footer">MADE BY JENNY</div>

<script>
    let currentHue = 0;
    let isDragging = false;
    const wheel = document.getElementById('wheel');
    const marker = document.getElementById('marker');

    function handlePointer(e) {
        const rect = wheel.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        currentHue = (Math.atan2(y - centerY, x - centerX) * (180 / Math.PI) + 90 + 360) % 360;
        
        const dx = x - centerX;
        const dy = y - centerY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const maxRadius = rect.width / 2;

        let markerX = x;
        let markerY = y;

        if (distance > maxRadius) {
            markerX = centerX + (dx / distance) * maxRadius;
            markerY = centerY + (dy / distance) * maxRadius;
        }

        marker.style.left = markerX + 'px';
        marker.style.top = markerY + 'px';
        
        update();
    }

    wheel.addEventListener('pointerdown', (e) => {
        isDragging = true;
        wheel.setPointerCapture(e.pointerId); 
        handlePointer(e);
    });

    wheel.addEventListener('pointermove', (e) => {
        if (isDragging) handlePointer(e);
    });

    wheel.addEventListener('pointerup', (e) => {
        isDragging = false;
        wheel.releasePointerCapture(e.pointerId);
    });

    function update() {
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;

        // Saturation Indicator
        const satStatus = document.getElementById('satStatus');
        if (s <= 25) {
            satStatus.innerText = "MUTED / GRAY";
            satStatus.style.color = "#888";
            satStatus.style.borderColor = "#888";
        } else if (s >= 80) {
            satStatus.innerText = "VIVID / NEON";
            satStatus.style.color = "#ff85a1";
            satStatus.style.borderColor = "#ff85a1";
        } else {
            satStatus.innerText = "BALANCED";
            satStatus.style.color = "#333";
            satStatus.style.borderColor = "#ffd1dc";
        }

        // Lightness Indicator
        const lightStatus = document.getElementById('lightStatus');
        if (l <= 30) {
            lightStatus.innerText = "DEEP / DARK";
            lightStatus.style.color = "#444";
            lightStatus.style.borderColor = "#444";
        } else if (l >= 75) {
            lightStatus.innerText = "PASTEL / SOFT";
            lightStatus.style.color = "#ff85a1";
            lightStatus.style.borderColor = "#ff85a1";
        } else {
            lightStatus.innerText = "NORMAL / VIBRANT";
            lightStatus.style.color = "#333";
            lightStatus.style.borderColor = "#ffd1dc";
        }

        // Color Math
        const oppHue = (currentHue + 180) % 360;
        
        const mainHex = hslToHex(currentHue, s, l);
        const oppHex = hslToHex(oppHue, s, l);
        
        const mainRgb = hslToRgb(currentHue, s, l);
        const oppRgb = hslToRgb(oppHue, s, l);

        // Core UI Main
        document.getElementById('mainBox').style.backgroundColor = mainHex;
        document.getElementById('hexMain').innerText = mainHex;
        document.getElementById('rgbMain').innerText = `rgb(${mainRgb.r}, ${mainRgb.g}, ${mainRgb.b})`;
        document.getElementById('hslMain').innerText = `hsl(${Math.round(currentHue)}, ${s}%, ${l}%)`;

        // Core UI Opposite
        document.getElementById('oppBox').style.backgroundColor = oppHex;
        document.getElementById('hexOpp').innerText = oppHex;
        document.getElementById('rgbOpp').innerText = `rgb(${oppRgb.r}, ${oppRgb.g}, ${oppRgb.b})`;
        document.getElementById('hslOpp').innerText = `hsl(${Math.round(oppHue)}, ${s}%, ${l}%)`;

        // Mockup
        document.getElementById('mockBtn').style.backgroundColor = mainHex;
        document.getElementById('mockBtn').style.color = l > 60 ? 'black' : 'white';
        document.getElementById('mockText').style.color = oppHex;

        // Gradients & Palettes
        renderRow('tonalRow', [20, 40, 60, 80, 95], 'light');
        renderRow('harmonyRow', [currentHue-30, currentHue-15, currentHue, currentHue+15, currentHue+30], 'hue');
    }

    function renderRow(id, values, type) {
        const row = document.getElementById(id);
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;
        row.innerHTML = '';
        values.forEach(val => {
            const h = type === 'hue' ? (val + 360) % 360 : currentHue;
            const light = type === 'light' ? val : l;
            const hex = hslToHex(h, s, light);
            const div = document.createElement('div');
            div.className = 'mini-swatch';
            div.style.backgroundColor = hex;
            div.onclick = () => { navigator.clipboard.writeText(hex); alert('Copied: ' + hex); };
            row.appendChild(div);
        });
    }

    // MATH CONVERSIONS
    function hslToHex(h, s, l) {
        l /= 100; const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
    }

    function hslToRgb(h, s, l) {
        s /= 100; l /= 100;
        const k = n => (n + h / 30) % 12;
        const a = s * Math.min(l, 1 - l);
        const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
        return { r: Math.round(255 * f(0)), g: Math.round(255 * f(8)), b: Math.round(255 * f(4)) };
    }

    function copy(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert('Copied: ' + text + ' ✨');
    }

    update();
</script>
</body>
</html>
